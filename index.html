const prodotti = datiTesto.trim().split('\n').map(r=>{

const p=r.split(';');

return {

c:(p[0]||''),

n:(p[1]||''),

pr:(p[2]||'')

};

});



function evidenzia(testo, ricerca){

if(!ricerca) return testo;

let reg = new RegExp(`(${ricerca})`, "gi");

return testo.replace(reg, '<span class="highlight">$1</span>');

}



function cerca(){



let val = document.getElementById('campo').value.toLowerCase();

let lista = document.getElementById('lista');

let info = document.getElementById('info');



lista.innerHTML="";



if(val.length<2){

info.innerHTML="";

return;

}



let risultati = prodotti.filter(p =>

p.c.toLowerCase().includes(val) ||

p.n.toLowerCase().includes(val)

);



info.innerHTML = risultati.length + " risultati";



if(risultati.length===0){

lista.innerHTML = `<div class="vuoto">Nessun risultato</div>`;

return;

}



risultati.slice(0,100).forEach(p=>{



lista.innerHTML += `

<div class="box">

<div class="cod">${p.c}</div>

<div class="nome">${evidenzia(p.n,val)}</div>

<div class="prezzo">€ ${p.pr}</div>

</div>

`;



});



}
