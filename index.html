const prodotti = datiTesto.trim().split('\n').map(r => {
    const p = r.split(';');
    return { c: (p[0] || '').trim(), n: (p[1] || '').trim(), pr: (p[2] || 'N.D.').trim() };
});

function cerca() {
    const val = document.getElementById('campo').value.toLowerCase();
    const div = document.getElementById('lista');
    div.innerHTML = '';
    if (val.length < 2) return;
    prodotti.forEach(p => {
        if (p.c.toLowerCase().includes(val) || p.n.toLowerCase().includes(val)) {
            div.innerHTML += `<div class="box">
                <div class="cod">${p.c}</div>
                <div class="nome">${p.n}</div>
                <div class="prezzo">${p.pr}</div>
            </div>`;
        }
    });
}
